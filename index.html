<head>

  <style>
    * { box-sizing: border-box; }

    body {
  margin: 0;
  font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", sans-serif;
  background: #efe7de;
  color: #6f5442;
  /* overflow: hidden; を消す */
}

.app {
  width: 100%;
  max-width: 100%;
  min-height: 100vh;
  margin: 0 auto;
  background: #f7efe6;
  position: relative;
  overflow: hidden;
  padding-bottom: 0;
}
.screen {
  display: none;
  width: 100%;
  position: relative;
}

.screen.active {
  display: block;
}

    .bg-image {
      width: 100%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    /* 作品のせる層 */
    .overlay-layer {
      position: absolute;
      inset: 0;
      z-index: 5;
    }
.ui-buttons {
  position: absolute;
  inset: 0;
  z-index: 10;
  pointer-events: none;
}
.ui-btn {
  position: absolute;
  width: 48px;            
  cursor: pointer;
  pointer-events: auto;
   transition: transform 0.08s, opacity 0.15s;
  opacity: 1;
}
/* 下の3つ */
.btn-add:active,
.btn-album:active,
.btn-setting:active {
  transform: translateX(-50%) scale(0.97);
  opacity: 0.9;
}

/* 位置（さらに下） */
.btn-add {
  left: 32%;
  transform: translateX(-50%);
  bottom: 120px;
}

.btn-album {
  left: 50%;
  transform: translateX(-50%);
  bottom: 120px;
}

.btn-setting {
  left: 68%;
  transform: translateX(-50%);
  bottom: 115px;
}
/* アルバム画面の下3つ */
.btn-add-album {
  left: 25%;
  transform: translateX(-50%);
  bottom: 34px;
  z-index: 15;
  
}

.btn-home-album {
  left: 50%;
  transform: translateX(-50%);
  bottom: 34px;
  z-index: 15;
  width: 36px;
}

.btn-setting-album {
  left: 75%;
  transform: translateX(-50%);
  bottom: 34px;
  z-index: 15;
}

/* アルバム画面ボタンを押したとき */
.btn-home-album:active,
.btn-add-album:active,
.btn-setting-album:active {
  transform: translateX(-50%) scale(0.97);
  opacity: 0.9;
}
    .art-slot {
  position: absolute;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.album-screen .art-slot {
  overflow: visible;
}


    .art-slot.empty {
      background: transparent;
    }

    /* 立体作品3枠 */
.shelf-1 {
  left: 220px;
  top: 280px;
  width: 48px;
  height: 48px;
  border-radius: 14px;
}

.shelf-2 {
  left: 275px;
  top: 325px;
  width: 48px;
  height: 48px;
  border-radius: 14px;
}

.shelf-3 {
  left: 330px;
  top: 280px;
  width: 48px;
  height: 48px;
  border-radius: 14px;
}


    .art-slot.sculpture img {
      object-fit: contain;
    }

    /* アルバム画面の8枠（右ページ調整版） */
.album-slot-1 { left: 106px; top: 78px; width: 68px; height: 84px; transform: rotate(-1deg); }
.album-slot-2 { left: 190px; top: 78px; width: 68px; height: 84px; }

.album-slot-3 { left: 324px; top: 78px; width: 68px; height: 84px; }
.album-slot-4 { left: 408px; top: 78px; width: 68px; height: 84px; transform: rotate(1deg); }

.album-slot-5 { left: 106px; top: 188px; width: 68px; height: 84px; }
.album-slot-6 { left: 190px; top: 188px; width: 68px; height: 84px; }

.album-slot-7 { left: 324px; top: 188px; width: 68px; height: 84px; }
.album-slot-8 { left: 408px; top: 188px; width: 68px; height: 84px; }

    /* 画像サイズに合わせて縮小 */
    .home-screen,
    .album-screen {
      transform-origin: top left;
    }

    /* 下ナビ */
    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      width: min(92%, 400px);
      background: rgba(255, 249, 242, 0.96);
      border: 2px solid #e3cfbc;
      border-radius: 28px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      box-shadow: 0 10px 24px rgba(113, 83, 57, 0.15);
      overflow: hidden;
      backdrop-filter: blur(8px);
      z-index: 20;
    }

    .nav-item {
      border: none;
      background: transparent;
      padding: 13px 8px 14px;
      font: inherit;
      color: #7d624f;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .nav-item span {
      font-size: 15px;
      font-weight: 700;
    }

    .nav-item small {
      font-size: 12px;
      color: #a28773;
    }

    .nav-item.active {
      background: rgba(255, 239, 225, 0.88);
    }

    .icon {
      font-size: 26px;
      line-height: 1;
    }

    /* 追加モーダル */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(80, 60, 45, 0.32);
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      z-index: 30;
    }

    .modal.show { display: flex; }

    .modal-card {
      width: 100%;
      max-width: 90vw;
      max-height: 90vh;
      background: #fffaf4;
      border: 2px solid #e5d1bf;
      border-radius: 24px;
      padding: 20px 16px;
      box-shadow: 0 18px 40px rgba(90, 65, 45, 0.18);
      margin: auto 0;
      overflow-y: auto;
    }

    .modal-card h2 {
      margin: 0 0 14px;
      font-size: 22px;
      color: #7a5b49;
      text-align: center;
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #8a6a56;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1.5px solid #e2d2c2;
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      background: #fff;
      color: #6f5442;
    }

    .field textarea {
      resize: vertical;
      min-height: 72px;
    }
.chip-group {
  display: flex;
  gap: 10px;
}

.chip-btn {
  border: 1.5px solid #e2d2c2;
  background: #fffdf9;
  color: #8a6a56;
  border-radius: 999px;
  padding: 10px 18px;
  font: inherit;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}

.chip-btn.selected {
  background: #f0d9c4;
  color: #7a5b49;
  border-color: #e1c3aa;
}

.chip-btn:active {
  transform: scale(0.97);
}
    .preview-box {
      width: 100%;
      height: 140px;
      border: 2px dashed #e4d3c2;
      border-radius: 14px;
      background: #fffdf9;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #b19582;
      font-size: 13px;
      text-align: center;
      margin-top: 6px;
       background: linear-gradient(45deg, #eee 25%, transparent 25%), 
              linear-gradient(-45deg, #eee 25%, transparent 25%), 
              linear-gradient(45deg, transparent 75%, #eee 75%), 
              linear-gradient(-45deg, transparent 75%, #eee 75%);
  background-size: 20px 20px;
  background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    }

    .preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .preview-box.has-image img { display: block; }
    .preview-box.has-image .preview-text { display: none; }

    .modal-buttons {
      display: grid;
  grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
      position: sticky;
      bottom: -1px;
      z-index: 3;
      background: #fffaf4;
      padding-top: 10px;
      padding-bottom: 2px;
    }

    .modal-buttons button {
      border: none;
      border-radius: 14px;
      padding: 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .main-btn {
      background: #f0d9c4;
      color: #7a5b49;
    }

    .sub-btn {
      background: #f8f1ea;
      color: #9a7d69;
      border: 1px solid #ead8c9;
    }

    .hint {
      margin-top: 6px;
      font-size: 12px;
      color: #a18774;
      line-height: 1.6;
    }

    .field input,
    .field select,
    .field textarea,
    .modal-buttons button {
      font-size: 16px;
    }

   
        .art-slot {
      cursor: pointer;
    }

    .art-slot.empty {
      cursor: default;
    }
    .album-pagination {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  bottom: 20%;  /* ←ここがポイント */
  width: 70%;   /* ←アルバム内に収める */
  z-index: 12;

  display: flex;
  align-items: center;
  justify-content: space-between;

  pointer-events: none;
}

.page-btn,
.page-indicator {
  pointer-events: auto;
}

.page-btn {
  border: none;
  background: rgba(255, 250, 244, 0.92);
  color: #7a5b49;
  font: inherit;
  font-size: 12px;
  font-weight: 700;
  border-radius: 12px;
  padding: 4px 10px;
  box-shadow: 0 4px 12px rgba(90, 65, 45, 0.16);
  cursor: pointer;
}

.page-btn:active {
  transform: scale(0.96);
}

.page-btn:disabled {
  opacity: 0.45;
  cursor: default;
}

.page-indicator {
  background: rgba(255, 250, 244, 0.88);
  color: #8a6a56;
  font-size: 12px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 12px;
  box-shadow: 0 4px 12px rgba(90, 65, 45, 0.12);
}
#displaySlotField {
  display: none;
}

#displaySlotButtons {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.slot-btn {
  border: 1.5px solid #e2d2c2;
  background: #fffdf9;
  color: #8a6a56;
  border-radius: 999px;
  padding: 10px 16px;
  font: inherit;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;

}

.slot-btn:hover {

}

.slot-btn:active {

}

}

    const USER_STORAGE_KEY = 'atelier-users-v1';

let currentUserId = null;
let selectedUserIcon = 'assets/icon_girl1.png';

const userModal = document.getElementById('userModal');
const openUserModalBtn = document.getElementById('openUserModal');
const closeUserModalBtn = document.getElementById('closeUserModalBtn');
const saveUserBtn = document.getElementById('saveUserBtn');
const userNameInput = document.getElementById('userNameInput');

userNameInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    userNameInput.blur();
  }
});

const userList = document.getElementById('userList');
const userIconButtons = document.querySelectorAll('.user-icon-btn');
const changeUserBtn = document.getElementById('changeUserBtn');
let users = loadUsers();
let pressTimer = null;

function loadUsers() {
  const saved = localStorage.getItem(USER_STORAGE_KEY);
  if (!saved) return [];

  try {
    return JSON.parse(saved);
  } catch (error) {
    console.error('ユーザー読み込み失敗', error);
    return [];
  }
}

function saveUsers() {
  localStorage.setItem(USER_STORAGE_KEY, JSON.stringify(users));
}
function deleteUser(userId) {
  users = users.filter(u => u.id !== userId);
  saveUsers();

  // そのユーザーの作品データも削除
  localStorage.removeItem(`atelier-artworks-${userId}`);

  // 今選んでるユーザーを削除した場合
  if (currentUserId === userId) {
    currentUserId = null;
    artworks = [];
    showTitle();
  }

  renderUsers();
}
function openUserModal() {
  userModal.classList.add('show');
  userNameInput.value = '';
  selectedUserIcon = 'assets/icon_girl1.png';

  userIconButtons.forEach((btn, index) => {
    btn.classList.remove('selected');
    if (index === 0) btn.classList.add('selected');
  });
}

function closeUserModal() {
  userModal.classList.remove('show');
}

function renderUsers() {
  userList.innerHTML = '';

  users.forEach(user => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'user-item';

    const img = document.createElement('img');
    img.src = user.icon;
    img.alt = user.name;

    const name = document.createElement('span');
    name.textContent = user.name;

    btn.appendChild(img);
    btn.appendChild(name);

    // ふつうにタップしたら選択
    btn.addEventListener('click', (event) => {
      if (btn.dataset.longPressed === 'true') {
        btn.dataset.longPressed = 'false';
        return;
      }

      event.stopPropagation();
      selectUser(user.id);
    });

    // スマホ長押しで削除
    btn.addEventListener('touchstart', (event) => {
      event.stopPropagation();

      pressTimer = setTimeout(() => {
        btn.dataset.longPressed = 'true';

        const ok = confirm(`${user.name}をけす？\nこのユーザーの作品もぜんぶ消えるよ。`);
        if (ok) {
          deleteUser(user.id);
        }
      }, 600);
    });

    btn.addEventListener('touchend', () => {
      clearTimeout(pressTimer);
    });

    btn.addEventListener('touchmove', () => {
      clearTimeout(pressTimer);
    });

    btn.addEventListener('touchcancel', () => {
      clearTimeout(pressTimer);
    });

    // パソコン用：右クリックで削除できるようにしておく
    btn.addEventListener('contextmenu', (event) => {
      event.preventDefault();
      event.stopPropagation();

      const ok = confirm(`${user.name}をけす？\nこのユーザーの作品もぜんぶ消えるよ。`);
      if (ok) {
        deleteUser(user.id);
      }
    });

    userList.appendChild(btn);
  });
}

function selectUser(userId) {
  currentUserId = userId;

  const user = users.find(u => u.id === userId);
  if (!user) return;

  if (atelierTitle) {
    atelierTitle.textContent = `${user.name}のさくひん`;
  }

  artworks = loadArtworks();
  currentAlbumPage = 1;
  renderAll();
  showHome();
}

openUserModalBtn.addEventListener('click', (event) => {
  event.stopPropagation();
  openUserModal();
});

closeUserModalBtn.addEventListener('click', (event) => {
  event.stopPropagation();
  closeUserModal();
});

saveUserBtn.addEventListener('click', (event) => {
  event.stopPropagation();

  const name = userNameInput.value.trim();
  if (!name) {
    alert('なまえをいれてね');
    return;
  }

  const newUser = {
    id: Date.now(),
    name,
    icon: selectedUserIcon
  };

  users.push(newUser);
  saveUsers();
  renderUsers();
  closeUserModal();

  // 追加したユーザーをすぐ選ぶ
  selectUser(newUser.id);
});

userModal.addEventListener('click', (event) => {
  if (event.target === userModal) {
    closeUserModal();
  }
});

userIconButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    selectedUserIcon = btn.dataset.icon;

    userIconButtons.forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  });
});

function applyRotation() {
  if (!originalPreviewDataUrl) return;

  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    if (currentRotation === 90 || currentRotation === 270) {
      canvas.width = img.height;
      canvas.height = img.width;
    } else {
      canvas.width = img.width;
      canvas.height = img.height;
    }

    ctx.save();

    if (currentRotation === 90) {
      ctx.translate(canvas.width, 0);
      ctx.rotate(Math.PI / 2);
    } else if (currentRotation === 180) {
      ctx.translate(canvas.width, canvas.height);
      ctx.rotate(Math.PI);
    } else if (currentRotation === 270) {
      ctx.translate(0, canvas.height);
      ctx.rotate(-Math.PI / 2);
    }

    ctx.drawImage(img, 0, 0);
    ctx.restore();

    previewDataUrl = canvas.toDataURL('image/png');
    previewImage.src = previewDataUrl;
    previewBox.classList.add('has-image');
  };

  img.src = originalPreviewDataUrl;
}
    function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onload = () => {
      const img = new Image();

      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxWidth = 1200;
        const maxHeight = 1200;
        let { width, height } = img;

        if (width > maxWidth || height > maxHeight) {
          const ratio = Math.min(maxWidth / width, maxHeight / height);
          width = Math.round(width * ratio);
          height = Math.round(height * ratio);
        }

        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);

        const isPng =
          file.type === 'image/png' ||
          file.name.toLowerCase().endsWith('.png');

        if (isPng) {
          resolve(canvas.toDataURL('image/png'));
        } else {
          resolve(canvas.toDataURL('image/jpeg', 0.82));
        }
      };

      img.onerror = reject;
      img.src = reader.result;
    };

    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function shuffleArray(array) {
  const copy = [...array];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function displayArtworkInSlot(artworkId, slot) {
  const artwork = artworks.find(item => item.id === artworkId);
  if (!artwork) return;

  if (!artwork.display) {
    artwork.display = {
      isDisplayed: false,
      displaySlot: '',
      isFavorite: false
    };
  }

  const options = getDisplayOptions(artwork);
  const isValidSlot = options.some(option => option.value === slot);
  if (!isValidSlot) return;

  const existingArtwork = findDisplayedArtworkBySlot(slot, artwork.id);
  if (existingArtwork) {
    existingArtwork.display.isDisplayed = false;
    existingArtwork.display.displaySlot = '';
    existingArtwork.display.isFavorite = false;
  }

  artwork.display.isDisplayed = true;

  artwork.display.isFavorite = slot === 'center';

    renderAlbum();

function displayFlatArtworkAutomatically(artworkId) {
  const artwork = artworks.find(item => item.id === artworkId);
  if (!artwork) return;

  const boardSlots = [
    'board-1',
    'board-2',
    'board-3',
    'board-4',
    'board-5',
    'board-6',
    'board-7',
    'board-8'
  ];

  // すでに展示中なら何もしない
  if (artwork.display?.isDisplayed) return;

  // 今使われてる board slot 一覧
  const usedSlots = artworks
    .filter(item => item.type === 'flat' && item.display?.isDisplayed && item.display?.displaySlot)
    .map(item => item.display.displaySlot);

  // 空いてる slot を探す
  const emptySlot = boardSlots.find(slot => !usedSlots.includes(slot));

  if (!emptySlot) {
    alert('ボードがいっぱいだよ');
    return;
  }

  if (!artwork.display) {
    artwork.display = {
      isDisplayed: false,
      displaySlot: '',
      isFavorite: false
    };
  }

  artwork.display.isDisplayed = true;
  artwork.display.displaySlot = emptySlot;
  artwork.display.isFavorite = false;

  if (saveArtworks()) {
    renderHome();
    renderAlbum();
  }

function fitOneScreen(screen) {
  const designWidth = 576;

  screen.style.width = designWidth + 'px';
  screen.style.position = 'relative';
  screen.style.left = '50%';
  screen.style.transformOrigin = 'top center';

  screen.style.transform = 'translateX(-50%) scale(1)';
  const naturalHeight = screen.offsetHeight;

  const vw = window.innerWidth;
  const vh = window.innerHeight;

  const scaleByWidth = vw / designWidth;
  const scaleByHeight = vh / naturalHeight;

  let scale = Math.min(scaleByWidth, scaleByHeight);

  if (screen.classList.contains('title-screen')) {
    scale *= 0.99;
  }

  if (screen.classList.contains('home-screen')) {
    scale *= 0.84;
  }

  if (screen.classList.contains('album-screen')) {
    scale *= 0.84;
  }

  screen.style.transform = `translateX(-50%) scale(${scale})`;
}
