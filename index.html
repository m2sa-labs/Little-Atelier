  detailImage.src = artwork.image;

  detailDate.textContent = artwork.date || '日付なし';

  const titleText = artwork.title ? `タイトル：${artwork.title}` : 'タイトル：だいじな作品';
  const memoText = artwork.memo ? `メモ：${artwork.memo}` : 'メモ：まだないよ';
  detailSummary.textContent = `${titleText}\n${memoText}`;

 const bgKey = getCurrentBgKey();
const currentDisplay = artwork.displayByBg?.[bgKey];

if (currentDisplay && currentDisplay.isDisplayed) {
  displayToggleBtn.textContent = '展示をはずす';
  displayToggleBtn.style.display = 'block';
} else {
  displayToggleBtn.style.display = 'none';
}

  detailModal.classList.add('show');
  displaySlotButtons.innerHTML = '';

  const displayOptions = getDisplayOptions(artwork);

  if (displayOptions.length > 0) {
    displaySlotField.style.display = 'block';

    displayOptions.forEach(option => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'slot-btn';
      button.textContent = option.label;

      if (currentDisplay && currentDisplay.displaySlot === option.value) {
  button.classList.add('current');
}

      const occupied = findDisplayedArtworkBySlot(option.value, artwork.id);
      if (occupied) {
        button.classList.add('disabled');
      }

      button.addEventListener('click', () => {
        displayArtworkInSlot(artwork.id, option.value);
        closeDetailModal();
      });

      displaySlotButtons.appendChild(button);
    });
  } else {
    displaySlotField.style.display = 'none';
  }
}

    function closeDetailModal() {
      detailModal.classList.remove('show');
      currentDetailId = null;
    }
    function closeModal() {
      addModal.classList.remove('show');
      document.activeElement.blur();
    }

  artImage.value = '';
 artSummary.value = '';
  artType.value = 'flat';
  
  previewDataUrl = '';
  selectedFile = null;
  selectedOrientation = 'horizontal';
  previewImage.src = '';
  previewBox.classList.remove('has-image');

    btn.classList.remove('selected');

    }
  });

  setTodayDate();
}

    function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onload = () => {
      const img = new Image();

      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxWidth = 1200;
        const maxHeight = 1200;
        let { width, height } = img;

        if (width > maxWidth || height > maxHeight) {
          const ratio = Math.min(maxWidth / width, maxHeight / height);
          width = Math.round(width * ratio);
          height = Math.round(height * ratio);
        }

        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);

        const isPng =
          file.type === 'image/png' ||
          file.name.toLowerCase().endsWith('.png');

        if (isPng) {
          resolve(canvas.toDataURL('image/png'));
        } else {
          resolve(canvas.toDataURL('image/jpeg', 0.82));
        }
      };

      img.onerror = reject;
      img.src = reader.result;
    };

    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

        function fillSlot(slot, artwork, useContain = false) {
  slot.innerHTML = '';
  slot.classList.remove('empty', 'album-horizontal', 'album-vertical');

  const img = document.createElement('img');
  img.src = artwork.image;
  img.alt = artwork.title || '作品';
  img.style.objectFit = useContain ? 'contain' : 'cover';
  
  slot.appendChild(img);

  if (slot.id && slot.id.startsWith('album') && artwork.type === 'flat') {
    if (artwork.orientation === 'horizontal') {
      slot.classList.add('album-horizontal');
    } else {
      slot.classList.add('album-vertical');
    }

    const tape = document.createElement('div');
    tape.className = 'tape';

    const color = tapeColors[Math.floor(Math.random() * tapeColors.length)];
    tape.style.background = color;

    const angle = Math.random() * 10 - 5;
    tape.style.transform = `translateX(-50%) rotate(${angle}deg)`;

    slot.appendChild(tape);

    if (Math.random() < 0.4) {
      const tape2 = document.createElement('div');
      tape2.className = 'tape';

      const color2 = tapeColors[Math.floor(Math.random() * tapeColors.length)];
      tape2.style.background = color2;

      const angle2 = Math.random() * 10 - 5;
      tape2.style.left = '60%';
      tape2.style.top = '-4px';
      tape2.style.transform = `translateX(-50%) rotate(${angle2}deg)`;

      slot.appendChild(tape2);
    }
  }

  slot.onclick = () => openDetailModal(artwork);
}
function clearSlot(slot) {
  slot.innerHTML = '';
  slot.classList.add('empty');
  slot.onclick = null;
}
    function renderHome() {

  const leftTopArtwork = artworks.find(item => item.displayByBg?.[bgKey]?.displaySlot === 'left-top');
  const leftBottomArtwork = artworks.find(item => item.displayByBg?.[bgKey]?.displaySlot === 'left-bottom');
  const centerArtwork = artworks.find(item => item.displayByBg?.[bgKey]?.displaySlot === 'center');
  const rightTopArtwork = artworks.find(item => item.displayByBg?.[bgKey]?.displaySlot === 'right-top');
  const rightBottomArtwork = artworks.find(item => item.displayByBg?.[bgKey]?.displaySlot === 'right-bottom');

  const shelf1Artwork = artworks.find(item => item.displayByBg?.[bgKey]?.displaySlot === 'shelf-1');
  const shelf2Artwork = artworks.find(item => item.displayByBg?.[bgKey]?.displaySlot === 'shelf-2');
  const shelf3Artwork = artworks.find(item => item.displayByBg?.[bgKey]?.displaySlot === 'shelf-3');
  const shelf4Artwork = artworks.find(item => item.displayByBg?.[bgKey]?.displaySlot === 'shelf-4');

  leftTopArtwork
    ? fillSlot(document.getElementById('homeFlat1'), leftTopArtwork, false)
    : clearSlot(document.getElementById('homeFlat1'));

  leftBottomArtwork
    ? fillSlot(document.getElementById('homeFlat2'), leftBottomArtwork, false)
    : clearSlot(document.getElementById('homeFlat2'));

  centerArtwork
    ? fillSlot(document.getElementById('homeFlatLarge'), centerArtwork, false)
    : clearSlot(document.getElementById('homeFlatLarge'));

  rightTopArtwork
    ? fillSlot(document.getElementById('homeFlat3'), rightTopArtwork, false)
    : clearSlot(document.getElementById('homeFlat3'));

  rightBottomArtwork
    ? fillSlot(document.getElementById('homeMini1'), rightBottomArtwork, false)
    : clearSlot(document.getElementById('homeMini1'));

  shelf1Artwork
    ? fillSlot(document.getElementById('homeShelf1'), shelf1Artwork, true)
    : clearSlot(document.getElementById('homeShelf1'));

  shelf2Artwork
    ? fillSlot(document.getElementById('homeShelf2'), shelf2Artwork, true)
    : clearSlot(document.getElementById('homeShelf2'));

  shelf3Artwork
    ? fillSlot(document.getElementById('homeShelf3'), shelf3Artwork, true)
    : clearSlot(document.getElementById('homeShelf3'));

  shelf4Artwork
    ? fillSlot(document.getElementById('homeShelf4'), shelf4Artwork, true)
    : clearSlot(document.getElementById('homeShelf4'));
    updateVerticalShelfDummies();
}
function updateVerticalShelfDummies() {
  const verticalDummyMap = {
    'shelf-1': dummyShelf1,
    'shelf-2': dummyShelf2,
    'shelf-3': dummyShelf3,
    'shelf-4': dummyShelf4
  };

  const horizontalDummyMap = {
    'shelf-1': dummyShelfH1,
    'shelf-2': dummyShelfH2,
    'shelf-3': dummyShelfH3
  };

  Object.values(verticalDummyMap).forEach(dummy => {
    if (dummy) dummy.classList.remove('show');
  });

  Object.values(horizontalDummyMap).forEach(dummy => {
    if (dummy) dummy.classList.remove('show');
  });

  const bgKey = getCurrentBgKey();

  if (bgKey === 'vertical') {
    ['shelf-1', 'shelf-2', 'shelf-3', 'shelf-4'].forEach(slot => {
      const artwork = artworks.find(item => item.displayByBg?.[bgKey]?.displaySlot === slot);
      if (!artwork && verticalDummyMap[slot]) {
        verticalDummyMap[slot].classList.add('show');
      }
    });
  }

  if (bgKey === 'horizontal') {
    ['shelf-1', 'shelf-2', 'shelf-3'].forEach(slot => {
      const artwork = artworks.find(item => item.displayByBg?.[bgKey]?.displaySlot === slot);
      if (!artwork && horizontalDummyMap[slot]) {
        horizontalDummyMap[slot].classList.add('show');
      }
    });
  }
}
    function renderAlbum() {
  const totalPages = getAlbumTotalPages();

  if (currentAlbumPage > totalPages) {
    currentAlbumPage = totalPages;
  }
  if (currentAlbumPage < 1) {
    currentAlbumPage = 1;
  }

  const startIndex = (currentAlbumPage - 1) * ALBUM_PAGE_SIZE;
  const pageItems = artworks.slice(startIndex, startIndex + ALBUM_PAGE_SIZE);

  albumSlots.forEach((slot, index) => {
    const artwork = pageItems[index];
    if (artwork) {
      fillSlot(slot, artwork, artwork.type === 'sculpture');
    } else {
      clearSlot(slot);
    }
  });

  pageIndicator.textContent = `${currentAlbumPage} / ${totalPages}`;
  prevPageBtn.disabled = currentAlbumPage === 1;
  nextPageBtn.disabled = currentAlbumPage === totalPages;
}
function getDisplayOptions(artwork) {
  const bgKey = getCurrentBgKey();

  if (artwork.type === 'flat') {
    if (bgKey === 'horizontal') {
      if (artwork.orientation === 'vertical') {
        return [
          { value: 'left-top', label: '左上' },
          { value: 'left-bottom', label: '左下' }
        ];
      }

      if (artwork.orientation === 'horizontal') {
        return [
          { value: 'center', label: '中央⭐' },
          { value: 'right-top', label: '右上' },
          { value: 'right-bottom', label: '右下' }
        ];
      }
    }

    if (bgKey === 'vertical') {
      if (artwork.orientation === 'vertical') {
        return [
          { value: 'center', label: '中央⭐' },
          { value: 'left-top', label: '左上' },
          { value: 'left-bottom', label: '左下' }
        ];
      }

      if (artwork.orientation === 'horizontal') {
        return [
          { value: 'right-top', label: '右上' },
          { value: 'right-bottom', label: '右下' }
        ];
      }
    }
  }

  if (artwork.type === 'sculpture') {
    return [
      { value: 'shelf-1', label: '棚1' },
      { value: 'shelf-2', label: '棚2' },
      { value: 'shelf-3', label: '棚3' },
      { value: 'shelf-4', label: '棚4' }
    ];
  }

  return [];
}
function findDisplayedArtworkBySlot(slot, ignoreId = null) {
  const bgKey = getCurrentBgKey();

  return artworks.find(item =>
    item.displayByBg?.[bgKey]?.displaySlot === slot &&
    item.id !== ignoreId
  );
}
function displayArtworkInSlot(artworkId, slot) {
  const artwork = artworks.find(item => item.id === artworkId);
  if (!artwork) return;

  const bgKey = getCurrentBgKey();

  if (!artwork.displayByBg) {
    artwork.displayByBg = {
      horizontal: { isDisplayed: false, displaySlot: '', isFavorite: false },
      vertical: { isDisplayed: false, displaySlot: '', isFavorite: false }
    };
  }

  const options = getDisplayOptions(artwork);
  const allowedSlots = options.map(option => option.value);

  if (!allowedSlots.includes(slot)) {
    alert('この作品はその場所にかざれないよ。');
    return;
  }

  const existingArtwork = findDisplayedArtworkBySlot(slot, artwork.id);
  if (existingArtwork) {
    alert('その場所には、すでに作品がかざってあるよ。');
    return;
  }

  artwork.displayByBg[bgKey].isDisplayed = true;
  artwork.displayByBg[bgKey].displaySlot = slot;
  artwork.displayByBg[bgKey].isFavorite = slot === 'center';

  saveArtworks();
  renderAll();
}
function removeArtworkFromDisplay(artworkId) {
  const artwork = artworks.find(item => item.id === artworkId);
  if (!artwork) return;

  const bgKey = getCurrentBgKey();

  if (!artwork.displayByBg) {
    artwork.displayByBg = {
      horizontal: { isDisplayed: false, displaySlot: '', isFavorite: false },
      vertical: { isDisplayed: false, displaySlot: '', isFavorite: false }
    };
  }

  artwork.displayByBg[bgKey].isDisplayed = false;
  artwork.displayByBg[bgKey].displaySlot = '';
  artwork.displayByBg[bgKey].isFavorite = false;

  saveArtworks();
  renderAll();
}

    function renderAll() {
      renderHome();
      renderAlbum();
    }

    artImage.addEventListener('change', async (event) => {
      const file = event.target.files[0];
      if (!file) return;

      selectedFile = file;
      previewBox.classList.remove('has-image');
      previewImage.src = '';
      previewDataUrl = '';

      try {
        previewDataUrl = await compressImage(file);
        previewImage.src = previewDataUrl;
        previewBox.classList.add('has-image');
      } catch (error) {
        console.error('画像読み込み失敗', error);
        alert('写真の読み込みに失敗したよ。もう一度えらんでみてね。');
      }
    });

    saveArtworkBtn.addEventListener('click', () => {
      if (!previewDataUrl) {
        alert('作品の写真を選んでね');
        return;
      }

      const summaryText = artSummary.value.trim();

const newArtwork = {
  id: Date.now(),
  image: previewDataUrl,
  title: summaryText || 'だいじな作品',
  type: artType.value,
  orientation: artType.value === 'flat' ? selectedOrientation : '',
  date: artDate.value,
  memo: summaryText,
  displayByBg: {
    horizontal: {
      isDisplayed: false,
      displaySlot: '',
      isFavorite: false
    },
    vertical: {
      isDisplayed: false,
      displaySlot: '',
      isFavorite: false
    }
  }
};

      const nextArtworks = [...artworks, newArtwork];
      const oldArtworks = artworks;
      artworks = nextArtworks;

      const saved = saveArtworks();
      if (!saved) {
        artworks = oldArtworks;
        return;
      }
currentAlbumPage = 1;
      renderAll();
      closeModal();
      showHome();
      
    });


    closeModalBtn.addEventListener('click', closeModal);

    addModal.addEventListener('click', (event) => {
      if (event.target === addModal) closeModal();
    });
        closeDetailBtn.addEventListener('click', closeDetailModal);

    detailModal.addEventListener('click', (event) => {
      if (event.target === detailModal) closeDetailModal();
    });

    deleteArtworkBtn.addEventListener('click', () => {
      if (currentDetailId === null) return;

      const ok = confirm('この作品をアトリエとアルバムからはずす？');
      if (!ok) return;

      artworks = artworks.filter(item => item.id !== currentDetailId);
      saveArtworks();
      const totalPages = getAlbumTotalPages();
  if (currentAlbumPage > totalPages) {
    currentAlbumPage = totalPages;
  }
      renderAll();
      closeDetailModal();
    });
    prevPageBtn.addEventListener('click', () => {
  if (currentAlbumPage > 1) {
    currentAlbumPage--;
    renderAlbum();
  }
});

nextPageBtn.addEventListener('click', () => {
  if (currentAlbumPage < getAlbumTotalPages()) {
    currentAlbumPage++;
    renderAlbum();
  }
});
bgModeButtons.forEach(button => {
  button.addEventListener('click', () => {
    selectedBgMode = button.dataset.bg;

    bgModeButtons.forEach(btn => btn.classList.remove('selected'));
    button.classList.add('selected');
  });
});

closeSettingModalBtn.addEventListener('click', () => {

});
changeUserBtn.addEventListener('click', () => {

});
saveSettingBtn.addEventListener('click', () => {

});

settingModal.addEventListener('click', (event) => {
  if (event.target === settingModal) {

  }
});
    
function fitScreens() {
  const designWidth = 576;
  const designHeight = 324;  // ← まずこれで試す

  const screens = document.querySelectorAll('.home-screen, .album-screen, .title-screen');
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  const scaleByWidth = vw / designWidth;
  const scaleByHeight = vh / designHeight;
  const scale = Math.min(scaleByWidth, scaleByHeight);

  screens.forEach(screen => {
    screen.style.width = designWidth + 'px';
    screen.style.transformOrigin = 'top center';
    screen.style.left = '50%';
    screen.style.position = 'relative';
    screen.style.transform = `translateX(-50%) scale(${scale})`;
  });
}

window.addEventListener('load', fitScreens);
window.addEventListener('resize', fitScreens);
window.addEventListener('orientationchange', () => {
  setTimeout(fitScreens, 300);
});
